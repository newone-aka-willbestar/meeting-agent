# ============================================================
# 会议数字员工 · 本地一键起（P0 骨架）
# 五个服务：backend / postgres / redis / qdrant / langfuse
# 启动：  docker compose up --build
# 关闭：  docker compose down        （加 -v 连数据卷一起删）
# ============================================================

services:
  # ---------- 后端 API（FastAPI） ----------
  backend:
    build: ./backend
    ports:
      - "8000:8000"          # 宿主机:容器
    env_file:
      - .env
    volumes:
      # 挂源码：改代码即时生效（配合 --reload），不必每次重建镜像
      - ./backend:/app
    # --reload：代码一改自动重启服务（开发用，生产去掉）
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy   # 等 DB 真正就绪再起，避免连不上
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ---------- 转写 worker（后台消费者，和 web 分开） ----------
  worker:
    build: ./backend
    env_file:
      - .env
    volumes:
      # 和 backend 挂同一份源码 + 同一个 storage 目录（worker 要读上传的音频）
      - ./backend:/app
    command: ["python", "-m", "app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- 关系库：会议 / 待办 / 元数据 ----------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次初始化时执行：额外建一个 langfuse 库
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- 缓存 / 异步转写任务队列 ----------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- 向量库：历史会议跨会检索 ----------
  qdrant:
    image: qdrant/qdrant:v1.15.1   # 钉死版本，避免 latest 漂移、且本地已有
    ports:
      - "6333:6333"          # REST/gRPC
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # ---------- 可观测：agent 步骤 / 工具调用 / token（P3 才真正接） ----------
  langfuse:
    image: langfuse/langfuse:2     # v2 只依赖一个 Postgres 库，P0 最省事
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"

volumes:
  pgdata:
  qdrantdata:
