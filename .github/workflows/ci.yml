# CI 骨架（P0）：lint + test。
# 后续 Phase 4 会在这里加一个 eval gate（抽取准确率不达标就拦住合并）。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 后端 lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        run: pip install -r requirements-dev.txt
      - name: Lint（ruff）
        run: ruff check .
      - name: 测试（pytest）
        run: pytest -q

  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 安装依赖
        run: npm install
      - name: 构建（能 build 通过即视为骨架健康）
        run: npm run build
