# ============================================================
# 生产部署（阿里云服务器）· 一键起
#   docker compose -f docker-compose.prod.yml up -d --build
# 与本地版区别：去掉 Langfuse（省资源）；前端用 nginx 托管静态页 + 反代；
# 后端用打包好的镜像（不挂源码、不开 reload）；只对外暴露 80 端口。
# ============================================================

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.1
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX: https://mirrors.aliyun.com/pypi/simple/   # 阿里云内网快、免梯子
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      args:
        PIP_INDEX: https://mirrors.aliyun.com/pypi/simple/
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
    ports:
      - "80:80"          # 对外只开这一个端口
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
