server {
    listen 80;
    client_max_body_size 50m;   # 允许上传较大的音频

    # 前端静态页（单页应用：找不到的路径都回 index.html，交给前端路由）
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # /api 反代到后端，并去掉 /api 前缀（proxy_pass 末尾的 / 起到 rewrite 作用）
    # 与开发期 vite 代理行为一致：/api/meetings -> 后端 /meetings
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;   # 转写/抽取较慢，放宽超时
    }
}
