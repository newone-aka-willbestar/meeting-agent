server {
    listen 80;
    client_max_body_size 50m;     # 允许上传较大的音频
    root /usr/share/nginx/html;

    # 作品集主页（根路径）
    location = / {
        try_files /index.html =404;
    }

    # 会议 app（单页应用，挂在 /meeting/ 下；找不到的子路径回 app 的 index.html）
    location /meeting/ {
        try_files $uri $uri/ /meeting/index.html;
    }

    # /api 反代到后端，去掉 /api 前缀（与开发期 vite 代理一致）
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;   # 转写/抽取较慢，放宽超时
    }
}
